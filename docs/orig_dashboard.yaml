              - type: custom:mushroom-entity-card
                entity: input_boolean.physical_alerts_enabled
                tap_action:
                  action: toggle
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            subtitle: DHW Settings
          - type: custom:mushroom-template-card
            entity: sensor.dhw_pump_status
            icon: mdi:pump
            primary: DHW Pump Status
            secondary: '{{ states(''sensor.dhw_pump_status'') }}'
            icon_color: >-
              {% if is_state('sensor.dhw_pump_status', 'Running') %}green {%
              elif is_state('sensor.dhw_pump_status', 'Auto Standby') %}blue {%
              else %}orange{% endif %}
            layout: horizontal
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-number-card
                entity: input_number.dhw_pump_interval_minutes
                display_mode: slider
                icon: mdi:timer-sand
              - type: custom:mushroom-number-card
                entity: input_number.dhw_pump_run_duration_minutes
                display_mode: slider
                icon: mdi:timer
              - type: custom:mushroom-number-card
                entity: input_number.dhw_pump_boost_duration_minutes
                display_mode: slider
                icon: mdi:timer-alert
              - type: custom:mushroom-number-card
                entity: input_number.solar_export_threshold
                display_mode: slider
                icon: mdi:solar-power
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: input_datetime.dhw_pump_start_time
                icon: mdi:clock-start
              - type: custom:mushroom-entity-card
                entity: input_datetime.dhw_pump_end_time
                icon: mdi:clock-end
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            subtitle: Battery Levels
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.*_battery
                  attributes:
                    unit_of_measurement: '%'
                  options:
                    type: custom:mushroom-template-card
                    icon: mdi:battery
                    primary: '{{ state_attr(config.entity, ''friendly_name'') }}'
                    secondary: '{{ states(config.entity) }}%'
                    icon_color: >-
                      {% set lvl = states(config.entity) | int(0) %} {% if lvl >
                      60 %}green{% elif lvl > 20 %}orange{% else %}red{% endif
                      %}
            sort:
              method: state
              numeric: true
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            subtitle: Zigbee Coordinator
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.slzb_mr2_core_chip_temp
                icon: mdi:chip
                primary: Core
                secondary: '{{ states(''sensor.slzb_mr2_core_chip_temp'') | round(1) }}°C'
                icon_color: >-
                  {% set t = states('sensor.slzb_mr2_core_chip_temp') | float(0)
                  %} {% if t < 60 %}green{% elif t < 70 %}orange{% else %}red{%
                  endif %}
              - type: custom:mushroom-template-card
                entity: sensor.slzb_mr2_zigbee_chip_temp
                icon: mdi:zigbee
                primary: Zigbee 1
                secondary: '{{ states(''sensor.slzb_mr2_zigbee_chip_temp'') | round(1) }}°C'
                icon_color: >-
                  {% set t = states('sensor.slzb_mr2_zigbee_chip_temp') |
                  float(0) %} {% if t < 60 %}green{% elif t < 70 %}orange{% else
                  %}red{% endif %}
              - type: custom:mushroom-template-card
                entity: sensor.slzb_mr2_zigbee_chip_temp_2
                icon: mdi:zigbee
                primary: Zigbee 2
                secondary: >-
                  {{ states('sensor.slzb_mr2_zigbee_chip_temp_2') | round(1)
                  }}°C
                icon_color: >-
                  {% set t = states('sensor.slzb_mr2_zigbee_chip_temp_2') |
                  float(0) %} {% if t < 60 %}green{% elif t < 70 %}orange{% else
                  %}red{% endif %}
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            subtitle: Network
          - type: custom:mushroom-template-card
            entity: sensor.unifi_status_display
            icon: mdi:lan
            primary: UniFi Network
            secondary: '{{ states(''sensor.unifi_status_display'') }}'
            icon_color: blue
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.main_switch_uptime
                icon: mdi:ethernet
                primary: Main Switch
                secondary: >-
                  Up since {{ as_timestamp(states('sensor.main_switch_uptime'))
                  | timestamp_custom('%b %d') }}
                icon_color: green
              - type: custom:mushroom-template-card
                entity: sensor.amaterasu_uptime
                icon: mdi:server
                primary: Server
                secondary: >-
                  Up since {{ as_timestamp(states('sensor.amaterasu_uptime')) |
                  timestamp_custom('%b %d') }}
                icon_color: green
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            subtitle: Updates
          - type: custom:auto-entities
            card:
              type: vertical-stack
            card_param: cards
            filter:
              include:
                - domain: update
                  state: 'on'
                  options:
                    type: custom:mushroom-update-card
                    entity: this.entity_id
                    show_buttons_control: true
            show_empty: true
            else:
              type: custom:mushroom-template-card
              icon: mdi:check-circle
              primary: All up to date
              icon_color: green
      - type: grid
        cards:
          - type: custom:streamline-card
            template: v2_navbar
    badges: []
    header:
      layout: responsive
      badges_position: top
      badges_wrap: wrap
    cards: []
    background:
      opacity: 50
      alignment: center
      size: cover
      repeat: no-repeat
      attachment: fixed
      image:
        media_content_id: /local/Green - Portrait.webp
  - title: Irrigation
    path: irrigation
    icon: mdi:sprinkler
    type: sections
    max_columns: 1
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:streamline-card
            template: page_header
            variables:
              title: Irrigation
              back_path: /dashboard-home/overview
          - type: custom:mushroom-template-card
            icon: mdi:sprinkler-variant
            primary: No irrigation configured
            secondary: Irrigation zones will appear here once added
            icon_color: grey
      - type: grid
        cards:
          - type: custom:streamline-card
            template: v2_navbar
    badges: []
    header:
      layout: responsive
      badges_position: top
      badges_wrap: wrap
    cards: []
    background:
      opacity: 50
      alignment: center
      size: cover
      repeat: no-repeat
      attachment: fixed
      image:
        media_content_id: /local/Green - Portrait.webp
