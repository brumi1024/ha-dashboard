kiosk_mode:
  mobile_settings:
    hide_header: true
views:
  - title: Overview
    type: sections
    max_columns: 1
    path: overview
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: wrap
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:mushroom-title-card
                    title: '{{ now().strftime(''%a %b %-d - %I:%M %p'') }}'
                    uix:
                      style: |
                        ha-card {
                          --title-font-size: 15px !important;
                          --title-color: var(--md-sys-color-on-surface-variant);
                        }
                  - type: custom:mushroom-chips-card
                    chips:
                      - type: template
                        entity: sensor.active_notification_count
                        icon: mdi:bell
                        tap_action:
                          action: navigate
                          navigation_path: '#notifications'
                        hold_action:
                          action: none
                        uix:
                          style: >
                            ha-card {
                              position: relative;
                            }

                            {% set notifications =
                            states('sensor.active_notification_count') | int %}

                            {% if notifications > 0 %}

                            ha-card:after {
                              content: "{{ notifications }}";
                              position: absolute;
                              top: -3px;
                              right: -3px;
                              background-color: color-mix(in srgb, var(--md-sys-color-on-primary) 50%, transparent);
                              color: var(--md-sys-color-primary);
                              border-radius: 50%;
                              width: 16px;
                              height: 16px;
                              font-size: 10px;
                              line-height: 16px;
                              text-align: center;
                              display: inline-block;
                              font-weight: bold;

                            } {% endif %}
                    alignment: end
                    uix:
                      style: |
                        ha-card {
                          position: absolute;
                          top: 20px;
                          right: 5px;
                        }
              - type: custom:mushroom-chips-card
                alignment: start
                chips:
                  - type: template
                    entity: weather.forecast_home
                    icon: '{{ states(''sensor.weather_condition_icon'') }}'
                    content: >-
                      {{ state_attr('weather.forecast_home', 'temperature') }}{{
                      state_attr('weather.forecast_home', 'temperature_unit')
                      }}, {{ states('weather.forecast_home') | title }}
                    tap_action:
                      action: navigate
                      navigation_path: '#weather-panel'
                    uix:
                      style: |
                        ha-card {
                          --chip-background: color-mix(in srgb, var(--md-sys-color-on-primary) 25%, transparent);
                          --color: var(--md-sys-color-primary);
                          --text-color: var(--md-sys-color-primary);
                        }
                  - type: template
                    entity: weather.forecast_home
                    content: >-
                      {% set hi = state_attr('sensor.daily_weather_data',
                      'temperature') %} {% set lo =
                      state_attr('sensor.daily_weather_data', 'templow') %} {%
                      if hi is not none and lo is not none %}
                        {{ hi | round(0) | int }}° Hi / {{ lo | round(0) | int }}° Lo
                      {% else %}N/A{% endif %}
                    tap_action:
                      action: navigate
                      navigation_path: '#weather-panel'
                    uix:
                      style: |
                        ha-card {
                          --chip-background: color-mix(in srgb, var(--md-sys-color-on-primary) 25%, transparent);
                          --color: var(--md-sys-color-primary);
                          --text-color: var(--md-sys-color-primary);
                        }
                uix:
                  style: |
                    ha-card {
                      overflow: visible !important;
                    }
              - type: custom:button-card
                show_entity_picture: false
                show_icon: false
                show_label: true
                entity: |
                  [[[ return "person." + user.name.toLowerCase(); ]]]
                name: |
                  [[[
                    const hour = new Date().getHours();
                    let greeting = "";

                    if (hour >= 22 || hour < 5) greeting = "Good Night";
                    else if (hour >= 18) greeting = "Evening";
                    else if (hour >= 12) greeting = "Afternoon";
                    else greeting = "Morning";

                    return `${greeting}, ${user.name}!`;
                  ]]]
                label: |
                  [[[
                    const s = entity.state;
                    if (s === "home") return "Home";
                    return "Away";
                  ]]]
                tap_action:
                  action: navigate
                  navigation_path: '?tab=benjamin#people-timeline'
                styles:
                  card:
                    - padding: 12px -2px 12px 12px
                    - background: none
                    - box-shadow: none
                  grid:
                    - grid-template-areas: '"pic n one" "pic l one"'
                    - grid-template-rows: min-content min-content
                    - grid-template-columns: 50px 1fr 50px
                  name:
                    - justify-self: start
                    - align-self: center
                    - font-size: 15px
                    - padding-left: 15px
                  label:
                    - justify-self: start
                    - align-self: start
                    - font-size: 12px
                    - color: var(--secondary-text-color)
                    - padding-left: 15px
                custom_fields:
                  pic:
                    card:
                      type: custom:button-card
                      entity: |
                        [[[ return entity.entity_id; ]]]
                      show_name: false
                      show_entity_picture: true
                      tap_action:
                        action: navigate
                        navigation_path: '?tab=benjamin#people-timeline'
                      styles:
                        card:
                          - position: relative
                          - overflow: visible
                        entity_picture:
                          - width: 40px
                          - height: 40px
                          - border-radius: 12px
                          - z-index: 1
                          - filter: |
                              [[[
                                const activeZones = ['home'];
                                const state = states[entity.entity_id]?.state;
                                return activeZones.includes(state)
                                  ? 'none'
                                  : 'grayscale(100%) brightness(70%)';
                              ]]]
                          - opacity: |
                              [[[
                                const activeZones = ['home'];
                                const state = states[entity.entity_id]?.state;
                                return activeZones.includes(state) ? '1' : '0.7';
                              ]]]
                        img_cell:
                          - background-color: var(--card-background-color)
                          - width: 40px
                          - height: 40px
                          - border-radius: 12px
                          - overflow: visible
                  one:
                    card:
                      type: custom:button-card
                      entity: >
                        [[[ return user.name == "Dia" ? "person.benjamin" :
                        "person.dia"; ]]]
                      show_name: false
                      show_entity_picture: true
                      tap_action:
                        action: navigate
                        navigation_path: '?tab=dia#people-timeline'
                      state:
                        - value: not_home
                          styles:
                            entity_picture:
                              - filter: grayscale(100%)
                              - opacity: 0.5
                      styles:
                        card:
                          - position: relative
                          - overflow: visible
                        entity_picture:
                          - width: 40px
                          - height: 40px
                          - border-radius: 12px
                          - z-index: 1
                          - filter: |
                              [[[
                                const activeZones = ['home'];
                                const state = states[entity.entity_id]?.state;
                                return activeZones.includes(state)
                                  ? 'none'
                                  : 'grayscale(100%) brightness(70%)';
                              ]]]
                          - opacity: |
                              [[[
                                const activeZones = ['home'];
                                const state = states[entity.entity_id]?.state;
                                return activeZones.includes(state) ? '1' : '0.7';
                              ]]]
                        img_cell:
                          - background-color: var(--card-background-color)
                          - width: 40px
                          - height: 40px
                          - border-radius: 12px
                          - overflow: visible
      - type: grid
        cards:
          - type: custom:simple-tabs
            pre-load: true
            active-background: var(--md-sys-color-primary)
            active-text-color: var(--md-sys-color-on-primary)
            text-color: var(--md-sys-color-on-surface)
            uix:
              style:
                .: |
                  ha-card {
                    animation: am-fade-in 300ms ease-out 0.2s both;
                  }
            tabs:
              - title: Home
                icon: m3of:home
                card:
                  type: vertical-stack
                  cards:
                    - type: grid
                      square: false
                      columns: 2
                      cards:
                        - type: custom:mushroom-template-card
                          entity: sensor.indoor_temperature_average
                          primary: >-
                            {{ states(entity) | round(1) }}{{
                            state_attr('weather.forecast_home',
                            'temperature_unit') }}
                          secondary: Indoor
                          icon: m3of:thermometer
                          icon_color: >-
                            {% set temp =
                            states('sensor.indoor_temperature_average') | float
                            %} {% if temp < 19 %}blue{% elif temp < 24 %}green{%
                            else %}orange{% endif %}
                        - type: custom:mushroom-template-card
                          entity: sensor.outdoor_temperature
                          primary: >-
                            {{ states(entity) | round(1) }}{{
                            state_attr('weather.forecast_home',
                            'temperature_unit') }}
                          secondary: Outdoor
                          icon: '{{ states(''sensor.weather_condition_icon'') }}'
                          icon_color: >-
                            {% set temp = state_attr('weather.forecast_home',
                            'temperature') | float %} {% if temp < 19 %}blue{%
                            elif temp < 24 %}green{% else %}orange{% endif %}
                    - type: custom:mini-graph-card
                      entities:
                        - entity: sensor.indoor_temperature_average
                          name: Indoor
                          color: var(--md-sys-color-tertiary)
                        - entity: sensor.outdoor_temperature
                          name: Outdoor
                          color: var(--md-sys-color-primary)
                          y_axis: secondary
                      hours_to_show: 24
                      line_width: 3
                      animate: true
                      show:
                        name: false
                        icon: false
                        state: false
                        legend: false
                        fill: fade
                    - type: custom:mushroom-title-card
                      subtitle: Modes
                    - type: custom:mushroom-chips-card
                      alignment: center
                      chips:
                        - type: template
                          entity: input_select.home_mode
                          icon: m3of:group-add
                          icon_color: >-
                            {% if is_state('input_select.home_mode', 'Guest')
                            %}amber{% endif %}
                          tap_action:
                            action: perform-action
                            perform_action: input_select.select_option
                            target:
                              entity_id: input_select.home_mode
                            data:
                              option: >-
                                {% if is_state('input_select.home_mode',
                                'Guest') %}Home{% else %}Guest{% endif %}
                          content: >-
                            {% if is_state('input_select.home_mode', 'Guest')
                            %}Guest{% endif %}
                        - type: template
                          entity: input_select.home_mode
                          icon: mdi:beach
                          icon_color: >-
                            {% if is_state('input_select.home_mode', 'Vacation')
                            %}blue{% endif %}
                          tap_action:
                            action: perform-action
                            perform_action: input_select.select_option
                            target:
                              entity_id: input_select.home_mode
                            data:
                              option: >-
                                {% if is_state('input_select.home_mode',
                                'Vacation') %}Home{% else %}Vacation{% endif %}
                          content: >-
                            {% if is_state('input_select.home_mode', 'Vacation')
                            %}Vacation{% endif %}
                    - type: custom:mushroom-title-card
                      subtitle: Scenes
                    - type: custom:mushroom-chips-card
                      alignment: center
                      chips:
                        - type: template
                          entity: script.scene_good_morning
                          icon: mdi:weather-sunny
                          tap_action:
                            action: perform-action
                            perform_action: script.turn_on
                            target:
                              entity_id: script.scene_good_morning
                          content: Morning
                        - type: template
                          entity: script.scene_good_night
                          icon: mdi:weather-night
                          tap_action:
                            action: perform-action
                            perform_action: script.turn_on
                            target:
                              entity_id: script.scene_good_night
                          content: Night
                        - type: template
                          entity: script.scene_away
                          icon: mdi:home-export-outline
                          tap_action:
                            action: perform-action
                            perform_action: script.turn_on
                            target:
                              entity_id: script.scene_away
                          content: Away
                        - type: template
                          entity: script.scene_welcome_home
                          icon: mdi:home-heart
                          tap_action:
                            action: perform-action
                            perform_action: script.turn_on
                            target:
                              entity_id: script.scene_welcome_home
                          content: Welcome
                        - type: template
                          entity: script.all_lights_off
                          icon: mdi:lightbulb-off
                          tap_action:
                            action: perform-action
                            perform_action: script.turn_on
                            target:
                              entity_id: script.all_lights_off
                          content: All Off
                        - type: template
                          entity: input_boolean.dhw_pump_boost
                          icon: mdi:water-boiler
                          icon_color: >-
                            {% if is_state('input_boolean.dhw_pump_boost', 'on')
                            %}
                              blue
                            {% endif %}
                          tap_action:
                            action: toggle
                          content: Hot Water
                    - type: custom:mushroom-title-card
                      subtitle: Security
                    - type: custom:mushroom-chips-card
                      alignment: center
                      chips:
                        - type: template
                          entity: lock.smart_lock_pro
                          icon: >-
                            {% if is_state(entity, 'locked') %}mdi:lock{% else
                            %}mdi:lock-open{% endif %}
                          icon_color: >-
                            {% if is_state(entity, 'locked') %}green{% else
                            %}red{% endif %}
                          tap_action:
                            action: more-info
                          content: >-
                            {% if is_state(entity, 'locked') %}Locked{% else
                            %}Unlocked{% endif %}
                        - type: template
                          entity: cover.garage_door
                          icon: >-
                            {% if is_state(entity, 'open')
                            %}mdi:garage-open-variant{% else
                            %}mdi:garage-variant{% endif %}
                          icon_color: >-
                            {% if is_state(entity, 'open') %}red{% else
                            %}green{% endif %}
                          tap_action:
                            action: more-info
                          content: >-
                            R: {% if is_state(entity, 'open') %}Open{% else
                            %}Closed{% endif %}
                        - type: template
                          entity: binary_sensor.left_garage_door_sensor_door
                          icon: >-
                            {% if is_state(entity, 'on')
                            %}mdi:garage-open-variant{% else
                            %}mdi:garage-variant{% endif %}
                          icon_color: >-
                            {% if is_state(entity, 'on') %}red{% else %}green{%
                            endif %}
                          tap_action:
                            action: more-info
                          content: >-
                            L: {% if is_state(entity, 'on') %}Open{% else
                            %}Closed{% endif %}
              - title: Events
                icon: mdi:calendar
                card:
                  type: vertical-stack
                  cards:
                    - entities:
                        - entity: calendar.benjamin_s_calendar
                          accent_color: var(--md-sys-color-primary)
                      days_to_show: 10
                      compact_events_to_show: 10
                      background_color: transparent
                      vertical_line_width: 5px
                      event_spacing: 6px
                      first_day_of_week: monday
                      show_week_numbers: iso
                      week_number_color: var(--md-sys-color-on-primary)
                      week_number_background_color: var(--md-sys-color-primary)
                      month_separator_width: 1px
                      month_separator_color: var(--md-sys-color-primary)
                      today_indicator: pulse
                      today_indicator_position: 10% 50%
                      today_indicator_color: var(--md-sys-color-primary)
                      weekday_font_size: 12px
                      month_font_size: 10px
                      show_countdown: true
                      show_progress_bar: true
                      progress_bar_color: var(--md-sys-color-primary)
                      weather:
                        position: event
                        date:
                          show_conditions: true
                          show_high_temp: true
                          show_low_temp: false
                          icon_size: 14px
                          font_size: 12px
                          color: var(--md-sys-color-on-surface)
                        event:
                          show_conditions: true
                          show_temp: true
                          icon_size: 14px
                          font_size: 12px
                          color: var(--md-sys-color-on-surface)
                        entity: weather.forecast_home
                      tap_action:
                        action: expand
                      type: custom:calendar-card-pro
              - title: Active
                icon: m3of:play-circle
                conditions:
                  - template: '{{ is_state(''light.all_lights'', ''on'') }}'
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-template-card
                      entity: light.all_lights
                      icon: mdi:lightbulb-on
                      primary: >-
                        {% set count = state_attr('light.all_lights',
                        'entity_id') | select('is_state', 'on') | list | count
                        %} {{ count }} Light{{ 's' if count != 1 }} On
                      icon_color: amber
                    - type: custom:auto-entities
                      card:
                        square: false
                        type: grid
                        columns: 2
                      card_param: cards
                      filter:
                        include:
                          - group: light.all_lights
                            state: 'on'
                            options:
                              type: custom:streamline-card
                              template: light_card
                              variables:
                                entity: this.entity_id
                      show_empty: false
                      sort:
                        method: entity_id
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#notifications'
                name: Notifications
                icon: m3of:notifications
                styles: |-
                  #root {
                          height: unset !important;
                          max-height: 100% !important;
                          transition: transform var(--md-sys-motion-expressive-spatial-default) !important;
                        }
                        .bubble-pop-up-container {
                          padding-bottom: 64px !important;
                          background: var(--md-sys-color-surface-container-low) !important;
                          --primary-text-color: var(--md-sys-color-on-surface);
                          --secondary-text-color: var(--md-sys-color-on-surface-variant);
                        }
                        .bubble-pop-up-background {
                          background-color: var(--md-sys-color-surface-container-low) !important;
                        }
                        .bubble-close-button {
                          background: transparent !important;
                        }
                button_type: name
                sub_button:
                  main:
                    - entity: input_select.home_mode
                      icon: m3of:group-add
                      tap_action:
                        action: perform-action
                        perform_action: input_select.select_option
                        target:
                          entity_id: input_select.home_mode
                        data:
                          option: >-
                            {% if is_state('input_select.home_mode', 'Guest')
                            %}Home{% else %}Guest{% endif %}
                      state_background: true
                      show_background: true
                      scrolling_effect: false
                  bottom: []
                slider_fill_orientation: left
                slider_value_position: right
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.home_mode
                    state: Guest
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      subtitle: WiFi QR Code
                    - type: picture
                      image:
                        media_content_id: /local/QR.jpg
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.myggbett_door_window_sensor_door
                    state: 'on'
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      subtitle: Garage
                    - type: custom:mushroom-chips-card
                      chips:
                        - type: template
                          entity: cover.garage_door
                          icon: |
                            {% if is_state(entity, 'open') %}
                              mdi:garage-open-variant
                            {% else %}
                              mdi:garage-variant
                            {% endif %}
                          content: |
                            {% if is_state(entity, 'open') %}
                              Garage Door Open
                            {% else %}
                              Garage Door Closed
                            {% endif %}
                          icon_color: |
                            {% if is_state(entity, 'open') %}
                              red
                            {% else %}
                              var(--ha-color-green-45)
                            {% endif %}
                          tap_action:
                            action: perform-action
                            perform_action: cover.close_cover
                            target:
                              entity_id: cover.garage_door
                      alignment: center
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.left_garage_door_sensor_door
                    state: 'on'
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:mushroom-title-card
                      subtitle: Garage
                    - type: custom:mushroom-chips-card
                      chips:
                        - type: template
                          entity: binary_sensor.left_garage_door_sensor_door
                          icon: mdi:garage-open-variant
                          content: Left Garage Door Open
                          icon_color: red
                          tap_action:
                            action: more-info
                      alignment: center
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.goe_249593_car_0
                    state: 'on'
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.raikiri_charging
                  icon: mdi:ev-station
                  icon_color: |
                    {% if is_state('sensor.raikiri_charging', 'charging') %}
                      green
                    {% else %}
                      amber
                    {% endif %}
                  primary: Raikiri · {{ states('sensor.raikiri_battery_level') }}%
                  secondary: >-
                    {{ states('sensor.goe_249593_nrg_11') | float(0) | round(0)
                    }}W · {{ states('sensor.goe_249593_wh') | float(0) |
                    round(1) }} kWh added
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.dhw_aux_heater_switch_power
                    above: 50
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.dhw_aux_heater_switch_power
                  icon: mdi:water-boiler
                  icon_color: orange
                  primary: DHW Booster Heater
                  secondary: >-
                    {{ states('sensor.dhw_aux_heater_switch_power') | float(0) |
                    round(0) }}W
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.dhw_pump_boost
                    state: 'on'
                card:
                  type: custom:mushroom-template-card
                  entity: input_boolean.dhw_pump_boost
                  icon: mdi:pump
                  icon_color: blue
                  primary: DHW Pump Boost
                  secondary: Manual boost active
                  layout: horizontal
                  tap_action:
                    action: toggle
              - type: conditional
                conditions:
                  - condition: state
                    entity: lock.smart_lock_pro
                    state: unlocked
                card:
                  type: custom:mushroom-template-card
                  entity: lock.smart_lock_pro
                  icon: mdi:door-open
                  icon_color: red
                  primary: Front Door Unlocked
                  secondary: Tap to lock
                  layout: horizontal
                  tap_action:
                    action: toggle
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.dishwasher_operation_state
                    state: run
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.dishwasher_program_progress
                  icon: mdi:dishwasher
                  icon_color: blue
                  primary: Dishwasher Running
                  secondary: '{{ states(''sensor.dishwasher_program_progress'') }}% complete'
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.dishwasher_operation_state
                    state: ready
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.dishwasher_operation_state
                  icon: mdi:dishwasher
                  icon_color: green
                  primary: Dishwasher Finished
                  secondary: Ready to unload
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.dishwasher_operation_state
                    state: finished
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.dishwasher_operation_state
                  icon: mdi:dishwasher
                  icon_color: green
                  primary: Dishwasher Finished
                  secondary: Ready to unload
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.oven_operation_state
                    state_not: inactive
                card:
                  type: custom:mushroom-template-card
                  entity: sensor.oven_current_oven_cavity_temperature
                  icon: mdi:stove
                  icon_color: deep-orange
                  primary: Oven Active
                  secondary: >-
                    {{ states('sensor.oven_current_oven_cavity_temperature')
                    }}°C
                  layout: horizontal
                  tap_action:
                    action: more-info
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: sensor.open_windows_count
                    above: 0
                card:
                  type: custom:mushroom-template-card
